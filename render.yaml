# Render Blueprint for the VoiceBridge backend.
# Apply via Render dashboard → Blueprints → New Blueprint Instance,
# or follow the manual UI walkthrough in RENDER_DEPLOYMENT.md.
#
# WARNING: Standard plan = 2 GB RAM. NLLB-200-distilled-600M alone needs
# ~2.4 GB at fp32, plus Whisper, FastAPI, Torch overhead. This config will
# likely OOM on first model load. Use WHISPER_MODEL_SIZE=tiny + accept the
# risk, or upgrade to plan: pro (4 GB) — see RENDER_DEPLOYMENT.md.

services:
  - type: web
    name: voicebridge-backend
    runtime: docker
    plan: standard                  # 2 GB RAM, 1 vCPU — likely OOMs on NLLB load
    region: oregon                  # change to your nearest region if needed
    rootDir: backend
    dockerfilePath: ./Dockerfile     # relative to rootDir (= backend/)
    dockerContext: .                 # relative to rootDir (= backend/)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: HOST
        value: 0.0.0.0
      # PORT is injected by Render at runtime — do NOT set it here.
      - key: DEVICE
        value: cpu
      - key: WHISPER_MODEL_SIZE
        value: base
      - key: MAX_AUDIO_DURATION
        value: "30"
      - key: CORS_ORIGINS
        value: "*"                  # tighten to your mobile origin before public launch
      - key: DATA_DIR
        value: /app/data            # mounted disk below; survives redeploys
      - key: ELEVENLABS_API_KEY
        sync: false                 # set in the Render dashboard, not in git
    disk:
      name: voicebridge-data
      mountPath: /app/data
      sizeGB: 1                     # cloned-voice metadata only; tiny file
