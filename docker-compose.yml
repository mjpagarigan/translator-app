version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - WHISPER_MODEL_SIZE=base
      - DEVICE=cpu
      - CORS_ORIGINS=*
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - whisper-cache:/root/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - EXPO_PUBLIC_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  huggingface-cache:
  whisper-cache:
